name: Deploy ECS

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Branch, tag, or commit to deploy
        required: true
        default: main

concurrency:
  group: deploy-ecs-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || 'main' }}

      - name: Configure SSH
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${ECS_HOST}" || (echo "Missing secret ECS_HOST" && exit 1)
          test -n "${ECS_SSH_PRIVATE_KEY}" || (echo "Missing secret ECS_SSH_PRIVATE_KEY" && exit 1)
          mkdir -p ~/.ssh
          printf '%s\n' "${ECS_SSH_PRIVATE_KEY}" > ~/.ssh/ecs_key
          chmod 600 ~/.ssh/ecs_key
          ssh-keyscan -p "${ECS_PORT:-22}" "${ECS_HOST}" >> ~/.ssh/known_hosts

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='backend/.venv' \
            --exclude='backend/runtime' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='node_modules' \
            --exclude='storage/dxm_category_attrs_runs' \
            --exclude='storage/exports' \
            --exclude='storage/processed' \
            --exclude='storage/screenshots' \
            --exclude='storage/uploads' \
            --exclude='storage/visual_generation' \
            --exclude='storage/yunqi_exports' \
            -czf /tmp/temu_listing_workbench_release.tgz .

      - name: Upload release
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_USER: ${{ secrets.ECS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ECS_PORT="${ECS_PORT:-22}"
          ECS_USER="${ECS_USER:-root}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/temu_listing_workbench}"
          ssh -i ~/.ssh/ecs_key -p "${ECS_PORT}" "${ECS_USER}@${ECS_HOST}" \
            "mkdir -p '${DEPLOY_PATH}' '${DEPLOY_PATH}/releases' '${DEPLOY_PATH}/shared'"
          scp -i ~/.ssh/ecs_key -P "${ECS_PORT}" /tmp/temu_listing_workbench_release.tgz \
            "${ECS_USER}@${ECS_HOST}:/tmp/temu_listing_workbench_release.tgz"

      - name: Deploy
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_USER: ${{ secrets.ECS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ECS_PORT="${ECS_PORT:-22}"
          ECS_USER="${ECS_USER:-root}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/temu_listing_workbench}"
          RELEASE_ID="$(date -u +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
          ssh -i ~/.ssh/ecs_key -p "${ECS_PORT}" "${ECS_USER}@${ECS_HOST}" \
            "set -euo pipefail
            DEPLOY_ROOT='${DEPLOY_PATH}'
            RELEASE_ID='${RELEASE_ID}'
            RELEASE_DIR=\"\${DEPLOY_ROOT}/releases/\${RELEASE_ID}\"
            mkdir -p \"\${RELEASE_DIR}\"
            tar -xzf /tmp/temu_listing_workbench_release.tgz -C \"\${RELEASE_DIR}\"
            rm -f /tmp/temu_listing_workbench_release.tgz
            DEPLOY_ROOT=\"\${DEPLOY_ROOT}\" DEPLOY_PATH=\"\${RELEASE_DIR}\" RELEASE_ID=\"\${RELEASE_ID}\" SOURCE_SHA='${GITHUB_SHA}' SKIP_GIT_PULL=1 bash \"\${RELEASE_DIR}/scripts/deploy_server.sh\""
