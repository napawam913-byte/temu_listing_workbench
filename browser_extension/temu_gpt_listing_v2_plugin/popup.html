<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Temu GPT Automator</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        color: #161616;
        background: #f7f7f5;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        line-height: 1.5;
        color: #4b4b4b;
      }

      button {
        width: 100%;
        height: 36px;
        border: 0;
        border-radius: 6px;
        color: #fff;
        background: #111;
        cursor: pointer;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Temu GPT 主图自动化</h1>
    <p>打开批量仪表盘，选择图片文件夹后按“规划 -> 执行 -> 下载”处理。</p>
    <button id="openDashboard" type="button">打开仪表盘</button>
    <script src="popup.js"></script>
  </body>
</html>
